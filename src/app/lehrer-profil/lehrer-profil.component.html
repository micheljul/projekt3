<div class="profil-formular">

  <input [(ngModel)]="neuerName" placeholder="Name">
  <input [(ngModel)]="neuesFach" placeholder="Unterrichtsfach">
  <input [(ngModel)]="neueHobbys" placeholder="Hobby">

  <input type="file" (change)="onFileSelected($event)" accept="image/*">
  
  <button (click)="datenSpeichern()">Profil speichern</button>


</div>
