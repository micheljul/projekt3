<div class="box">
  <h2>Lehrer-Profil anlegen</h2>

  <form class="profile-form">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required placeholder="">
    </div>

    <div class="form-group">
      <label for="unterrichtsfach">Unterrichtsfach:</label>
      <input type="text" id="unterrichtsfach" name="unterrichtsfach" required placeholder="">
    </div>

    <div class="form-group">
      <label for="sprechstunde">Sprechstunde:</label>
      <input type="text" id="sprechstunde" name="sprechstunde" placeholder="">
    </div>

    <div class="form-group">
      <label for="beschreibung">Beschreibung / Infos:</label>
      <textarea id="beschreibung" name="beschreibung" rows="4" placeholder="Zusätzliche Informationen..."></textarea>
    </div>

    <button type="submit">Profil speichern</button>
  </form>
</div>
