<div class="page-wrapper">
  <div class="detail-card">

    <!-- Header -->
    <div class="card-header">
      <div class="header-icon">👨‍🏫</div>

      <h2>{{ profil?.name ? profil.name : 'Lehrer-Profil' }}</h2>

      @if (darfBearbeiten) {
        <button class="edit-btn" (click)="modusWechseln()">
          {{ istBearbeiten ? '❌ Abbrechen' : '✏️ Bearbeiten' }}
        </button>
      }
    </div>

    <div class="card-body">

      <!-- READ MODE -->
      @if (!istBearbeiten) {

        <div class="info-grid">

          <div class="info-item">
            <span class="label">Name</span>
            <span class="value">{{ profil?.name }}</span>
          </div>

          <div class="info-item">
            <span class="label">Unterrichtsfach</span>
            <span class="value">{{ profil?.unterrichtsfach }}</span>
          </div>

          <div class="info-item full-width">
            <span class="label">Hobby</span>
            <span class="value">{{ profil?.hobbys || '-' }}</span>
          </div>

        </div>

      } @else {

        <div class="edit-form">

          <div class="form-group">
            <label>Name</label>
            <input type="text" [(ngModel)]="profil.name">
          </div>

          <div class="form-group">
            <label>Unterrichtsfach</label>
            <input type="text" [(ngModel)]="profil.unterrichtsfach">
          </div>

          <div class="form-group full-width">
            <label>Hobby</label>
            <input type="text" [(ngModel)]="profil.hobbys">
          </div>

          <button class="save-btn" (click)="speichern()">💾 Speichern</button>

        </div>

      }

    </div>

    <!-- Footer -->
    <div class="card-footer">
      <button class="back-btn" [routerLink]="['/dashboard']">
        🔙 Zurück zum Dashboard
      </button>
    </div>

  </div>
</div>
