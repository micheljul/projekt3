<div class="page-wrapper">
  <div class="detail-card">

    <div class="card-header">
      <div class="header-icon">👨‍🏫</div>

      <h2>Lehrer-Profil</h2>

      @if (istBearbeiten) {
        <button class="edit-btn" (click)="modusWechseln()">
          ❌ Abbrechen
        </button>
      } @else {
        <button class="edit-btn" (click)="modusWechseln()">
          ✏️ Bearbeiten
        </button>
      }

    </div>

    <div class="card-body">

      <!-- READ MODE -->
      @if (!istBearbeiten) {

        <div class="info-grid">

          <div class="info-item">
            <span class="label">Name</span>
            <span class="value">{{ profil.name || '—' }}</span>
          </div>

          <div class="info-item">
            <span class="label">Fach</span>
            <span class="value">{{ profil.unterrichtsfach || '—' }}</span>
          </div>

          <div class="info-item full-width">
            <span class="label">Sprechstunde</span>
            <span class="value">{{ profil.sprechstunde || '—' }}</span>
          </div>

          <div class="info-item full-width">
            <span class="label">Beschreibung</span>
            <span class="value">{{ profil.beschreibung || '—' }}</span>
          </div>

        </div>

      }

      <!-- EDIT MODE -->
      @else {

        <div class="edit-form">

          <div class="form-group">
            <label>Name</label>
            <input [(ngModel)]="profil.name">
          </div>

          <div class="form-group">
            <label>Unterrichtsfach</label>
            <input [(ngModel)]="profil.unterrichtsfach">
          </div>

          <div class="form-group">
            <label>Sprechstunde</label>
            <input [(ngModel)]="profil.sprechstunde">
          </div>

          <div class="form-group">
            <label>Beschreibung</label>
            <textarea rows="4" [(ngModel)]="profil.beschreibung"></textarea>
          </div>

          <button class="save-btn" (click)="speichern()">
            💾 Speichern
          </button>

        </div>

      }

    </div>

    <div class="card-footer">
      <button class="back-btn" routerLink="/dashboard">
        🔙 Zurück
      </button>
    </div>

  </div>
</div>
