<div class="box">
  <h1>Login</h1>

  <input #email placeholder="E-Mail">
  <input #password type="password" placeholder="Passwort">

  <button (click)="login(email.value, password.value)">
    Einloggen
  </button>

  <button routerLink="/registrieren">
    Registrieren
  </button>

  <p [style.color]="messageColor">
    {{ message }}
  </p>
</div>
