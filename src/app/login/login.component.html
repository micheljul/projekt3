<div class="box">
  <h1>Login</h1>

  <input #firstName placeholder="Vorname">
  <input #lastName placeholder="Nachname">
  <input #password type="password" placeholder="Passwort">

  <button (click)="login(firstName.value, lastName.value, password.value)">
    Einloggen
  </button>

  <button routerLink="/registrieren">
    Registrieren
  </button>

  <p [style.color]="messageColor">
    {{ message }}
  </p>
</div>
